name: Build ToonStream Extension

on:
  push:
    branches: [ master ]
    paths:
      - 'src/en/toonstream/**'
      - 'lib/**'
      - 'core/**'
  workflow_dispatch:   # allows manual run

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Build extension (unsigned)
        run: ./gradlew :src:en:toonstream:assembleRelease

      - name: Find the unsigned APK
        id: find_apk
        run: |
          UNSIGNED_APK=$(find src/en/toonstream/build/outputs/apk -name "*.apk" | head -n 1)
          echo "UNSIGNED_APK=$UNSIGNED_APK" >> $GITHUB_ENV
          echo "Found unsigned APK at: $UNSIGNED_APK"

      - name: Generate debug keystore (for signing)
        run: |
          keytool -genkey -v -keystore debug.keystore \
            -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US"

      - name: Sign the APK
        run: |
          # Sign using apksigner (part of Android SDK)
          # First, ensure apksigner is available (it is, via build tools)
          export PATH=$ANDROID_HOME/build-tools/34.0.0:$PATH
          apksigner sign --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out aniyomi-en.toonstream-v1.0.apk \
            "${{ env.UNSIGNED_APK }}"

      - name: Upload signed APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ToonStream-Signed-APK
          path: aniyomi-en.toonstream-v1.0.apk
          retention-days: 7
