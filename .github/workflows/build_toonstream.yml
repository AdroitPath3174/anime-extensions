name: Build ToonStream Extension

on:
  push:
    branches: [ master ]
    paths:
      - 'src/en/toonstream/**'
      - 'lib/**'
      - 'core/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore src/en/toonstream/debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build signed APK
        run: |
          ./gradlew :src:en:toonstream:assembleRelease \
            -Pandroid.injected.signing.store.file=src/en/toonstream/debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android

      - name: Rename APK to official format
        run: |
          APK=$(find src/en/toonstream/build/outputs/apk/release -name "*.apk" | head -1)
          mv "$APK" aniyomi-en.toonstream-v1.0.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: ToonStream-Signed
          path: aniyomi-en.toonstream-v1.0.apk
          retention-days: 7
